version: '3'
services:
  mysql:
    image: mysql:5.7
    restart: always
    ports:
    - "3306:3306"
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: bookshelf_test
  postgres:
    image: postgres:9
    restart: always
    ports:
    - "5432:5432"
    environment:
      POSTGRES_DB: bookshelf_test
